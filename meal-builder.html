<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meal Builder - Food Maps</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>

<body class="bg-gray-50">
  <div id="root"></div>

  <script type="text/babel" src="components/MealBuilder.js"></script>

  <script type="text/babel">
    const { React, ReactDOM } = window;
    const { useState, useEffect } = React;

    function MealBuilderApp() {
      const [claimedListings, setClaimedListings] = useState([]);
      const [loading, setLoading] = useState(true);
      const [user, setUser] = useState(null);

      useEffect(() => {
        // Check authentication
        const token = localStorage.getItem('token');
        const userData = localStorage.getItem('user');

        if (token && userData) {
          setUser(JSON.parse(userData));
          fetchClaimedListings(token);
        } else {
          setLoading(false);
        }
      }, []);

      const fetchClaimedListings = async (token) => {
        try {
          const response = await fetch('/api/listings/get', {
            headers: {
              'Authorization': `Bearer ${token}`
            }
          });

          if (response.ok) {
            const listings = await response.json();
            // Filter to only claimed listings by this user
            const claimed = listings.filter(l =>
              l.status === 'claimed' && l.recipient_id === user?.id
            );
            setClaimedListings(claimed);
          }
        } catch (error) {
          console.error('Error fetching listings:', error);
        } finally {
          setLoading(false);
        }
      };

      if (loading) {
        return React.createElement('div', { className: 'min-h-screen flex items-center justify-center' },
          React.createElement('div', { className: 'text-center' },
            React.createElement('div', { className: 'text-xs mb-4 uppercase tracking-[0.2em] text-gray-500' }, 'Meals'),
            React.createElement('div', { className: 'text-gray-600' }, 'Loading meal builder...')
          )
        );
      }

      if (!user) {
        return React.createElement('div', { className: 'min-h-screen flex items-center justify-center bg-gradient-to-b from-green-50 to-blue-50' },
          React.createElement('div', { className: 'text-center max-w-md p-8 bg-white rounded-lg shadow-lg' },
            React.createElement('div', { className: 'text-xs mb-4 uppercase tracking-[0.2em] text-gray-500' }, 'Meals'),
            React.createElement('h1', { className: 'text-2xl font-bold mb-4' }, 'Sign In Required'),
            React.createElement('p', { className: 'text-gray-600 mb-6' },
              'Please sign in to use the meal builder and see your claimed food items.'
            ),
            React.createElement('button', {
              onClick: () => window.location.href = '/',
              className: 'px-6 py-3 bg-green-500 text-white rounded-lg hover:bg-green-600 font-semibold',
              type: 'button'
            }, 'Go to Home Page')
          )
        );
      }

      return React.createElement('div', { className: 'min-h-screen' },
        // Header
        React.createElement('div', { className: 'bg-white border-b border-gray-200 sticky top-0 z-10' },
          React.createElement('div', { className: 'container mx-auto px-4 py-4 flex items-center justify-between' },
            React.createElement('div', { className: 'flex items-center gap-4' },
              React.createElement('button', {
                onClick: () => window.location.href = '/',
                className: 'text-gray-600 hover:text-gray-900',
                type: 'button'
              }, '← Back'),
              React.createElement('h1', { className: 'text-xl font-bold' }, 'Meal Builder')
            ),
            React.createElement('div', { className: 'text-sm text-gray-600' },
              `Hello, ${user.name}`
            )
          )
        ),

        // Main Content
        React.createElement('div', { className: 'container mx-auto px-4 py-8 max-w-6xl' },
          React.createElement('div', { className: 'bg-white rounded-lg shadow-lg overflow-hidden' },
            React.createElement(window.MealBuilder, {
              claimedListings,
              userLocation: null
            })
          ),

          // Info Section
          React.createElement('div', { className: 'mt-8 grid grid-cols-1 md:grid-cols-3 gap-6' },
            React.createElement('div', { className: 'p-6 bg-blue-50 rounded-lg' },
              React.createElement('div', { className: 'text-xs mb-3 uppercase tracking-[0.2em] text-blue-700 font-semibold' }, 'Simple'),
              React.createElement('h3', { className: 'font-bold mb-2' }, 'Simple & Easy'),
              React.createElement('p', { className: 'text-sm text-gray-700' },
                'Get meal ideas that are quick to prepare with minimal cooking skills required.'
              )
            ),
            React.createElement('div', { className: 'p-6 bg-green-50 rounded-lg' },
              React.createElement('div', { className: 'text-xs mb-3 uppercase tracking-[0.2em] text-green-700 font-semibold' }, 'Family'),
              React.createElement('h3', { className: 'font-bold mb-2' }, 'Kid-Friendly'),
              React.createElement('p', { className: 'text-sm text-gray-700' },
                'Discover meals that children will actually enjoy eating.'
              )
            ),
            React.createElement('div', { className: 'p-6 bg-purple-50 rounded-lg' },
              React.createElement('div', { className: 'text-xs mb-3 uppercase tracking-[0.2em] text-purple-700 font-semibold' }, 'Global'),
              React.createElement('h3', { className: 'font-bold mb-2' }, 'Culturally Relevant'),
              React.createElement('p', { className: 'text-sm text-gray-700' },
                'Find recipes that match your cultural food preferences and traditions.'
              )
            )
          ),

          // Quick Challenge Info
          React.createElement('div', { className: 'mt-6 p-6 bg-gradient-to-r from-orange-100 to-red-100 rounded-lg border-2 border-orange-300' },
            React.createElement('div', { className: 'flex items-start gap-4' },
              React.createElement('div', { className: 'text-xs uppercase tracking-[0.2em] text-red-700 font-semibold mt-1' }, 'Challenge'),
              React.createElement('div', {},
                React.createElement('h3', { className: 'font-bold text-lg mb-2' },
                  'Try the Quick Challenge!'
                ),
                React.createElement('p', { className: 'text-gray-700 mb-2' },
                  'Can you make 3 meals in under 20 minutes each without an oven? Our AI will help you plan it out!'
                ),
                React.createElement('div', { className: 'flex gap-2 text-sm' },
                  React.createElement('span', { className: 'bg-white px-3 py-1 rounded-full font-semibold' },
                    'Fast'
                  ),
                  React.createElement('span', { className: 'bg-white px-3 py-1 rounded-full font-semibold' },
                    'No Oven'
                  ),
                  React.createElement('span', { className: 'bg-white px-3 py-1 rounded-full font-semibold' },
                    'Challenge Mode'
                  )
                )
              )
            )
          )
        )
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(MealBuilderApp));
  </script>
</body>

</html>
