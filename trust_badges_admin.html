<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trust Badge Admin - Food Maps</title>
  <script crossorigin src="https://resource.trickle.so/vendor_lib/unpkg/react@18/umd/react.production.min.js"></script>
  <script crossorigin
    src="https://resource.trickle.so/vendor_lib/unpkg/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://resource.trickle.so/vendor_lib/unpkg/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://resource.trickle.so/vendor_lib/unpkg/lucide-static@0.516.0/font/lucide.css" rel="stylesheet">
</head>

<body class="bg-gray-50">
  <div id="root"></div>

  <script type="text/babel" src="components/TrustBadge.js"></script>
  <script type="text/babel">
    function TrustBadgeAdmin() {
      const [users, setUsers] = React.useState([]);
      const [centers, setCenters] = React.useState([]);
      const [loading, setLoading] = React.useState(true);
      const [selectedUser, setSelectedUser] = React.useState(null);
      const [selectedCenter, setSelectedCenter] = React.useState(null);
      const [searchQuery, setSearchQuery] = React.useState('');
      const [activeTab, setActiveTab] = React.useState('users'); // 'users' or 'centers'

      React.useEffect(() => {
        loadData();
      }, []);

      const loadData = async () => {
        setLoading(true);
        try {
          const token = localStorage.getItem('auth_token');

          // Load users
          const usersResp = await fetch('/api/admin/users', {
            headers: { 'Authorization': `Bearer ${token}` }
          });
          if (usersResp.ok) {
            const usersData = await usersResp.json();
            setUsers(usersData);
          }

          // Load distribution centers
          const centersResp = await fetch('/api/centers');
          if (centersResp.ok) {
            const centersData = await centersResp.json();
            setCenters(centersData);
          }
        } catch (error) {
          console.error('Error loading data:', error);
        } finally {
          setLoading(false);
        }
      };

      const filteredUsers = users.filter(user =>
        user.name?.toLowerCase().includes(searchQuery.toLowerCase()) ||
        user.email?.toLowerCase().includes(searchQuery.toLowerCase())
      );

      const filteredCenters = centers.filter(center =>
        center.name?.toLowerCase().includes(searchQuery.toLowerCase()) ||
        center.address?.toLowerCase().includes(searchQuery.toLowerCase())
      );

      return (
        <div className="min-h-screen p-6">
          <div className="max-w-7xl mx-auto">
            <div className="bg-white rounded-lg shadow-lg p-6 mb-6">
              <h1 className="text-3xl font-bold text-gray-900 mb-2">Trust Badge Management</h1>
              <p className="text-gray-600">Assign AGLF verification and partner badges to build community trust</p>
            </div>

            {/* Tabs */}
            <div className="bg-white rounded-lg shadow-lg mb-6">
              <div className="flex border-b">
                <button
                  onClick={() => setActiveTab('users')}
                  className={`px-6 py-3 font-medium ${activeTab === 'users' ? 'border-b-2 border-green-600 text-green-600' : 'text-gray-600 hover:text-gray-900'}`}
                >
                  Users ({users.length})
                </button>
                <button
                  onClick={() => setActiveTab('centers')}
                  className={`px-6 py-3 font-medium ${activeTab === 'centers' ? 'border-b-2 border-green-600 text-green-600' : 'text-gray-600 hover:text-gray-900'}`}
                >
                  Distribution Centers ({centers.length})
                </button>
              </div>

              {/* Search */}
              <div className="p-4 border-b">
                <input
                  type="text"
                  placeholder={`Search ${activeTab}...`}
                  value={searchQuery}
                  onChange={(e) => setSearchQuery(e.target.value)}
                  className="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-green-500"
                />
              </div>

              {/* Users List */}
              {activeTab === 'users' && (
                <div className="divide-y max-h-[600px] overflow-y-auto">
                  {loading ? (
                    <div className="p-8 text-center text-gray-500">Loading users...</div>
                  ) : filteredUsers.length === 0 ? (
                    <div className="p-8 text-center text-gray-500">No users found</div>
                  ) : (
                    filteredUsers.map(user => (
                      <div key={user.id} className="p-4 hover:bg-gray-50 flex items-center justify-between">
                        <div className="flex-1">
                          <div className="font-medium text-gray-900">{user.name}</div>
                          <div className="text-sm text-gray-600">{user.email} • {user.role}</div>
                          <div className="mt-2">
                            <TrustBadge
                              verifiedByAGLF={user.verified_by_aglf}
                              schoolPartner={user.school_partner}
                              partnerBadge={user.partner_badge}
                              partnerSince={user.partner_since}
                              lastActive={user.last_active}
                              trustScore={user.trust_score}
                              size="small"
                              showDetails={true}
                            />
                          </div>
                        </div>
                        <button
                          onClick={() => setSelectedUser(user)}
                          className="ml-4 px-4 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700"
                        >
                          Edit Badges
                        </button>
                      </div>
                    ))
                  )}
                </div>
              )}

              {/* Centers List */}
              {activeTab === 'centers' && (
                <div className="divide-y max-h-[600px] overflow-y-auto">
                  {loading ? (
                    <div className="p-8 text-center text-gray-500">Loading centers...</div>
                  ) : filteredCenters.length === 0 ? (
                    <div className="p-8 text-center text-gray-500">No centers found</div>
                  ) : (
                    filteredCenters.map(center => (
                      <div key={center.id} className="p-4 hover:bg-gray-50 flex items-center justify-between">
                        <div className="flex-1">
                          <div className="font-medium text-gray-900">{center.name}</div>
                          <div className="text-sm text-gray-600">{center.address}</div>
                          <div className="mt-2">
                            <TrustBadge
                              verifiedByAGLF={center.verified_by_aglf}
                              schoolPartner={center.school_partner}
                              partnerBadge={center.partner_badge}
                              partnerSince={center.partner_since}
                              lastUpdated={center.last_updated}
                              size="small"
                              showDetails={true}
                            />
                          </div>
                        </div>
                        <button
                          onClick={() => setSelectedCenter(center)}
                          className="ml-4 px-4 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700"
                        >
                          Edit Badges
                        </button>
                      </div>
                    ))
                  )}
                </div>
              )}
            </div>
          </div>

          {/* Edit User Badges Modal */}
          {selectedUser && (
            <AssignTrustBadgeModal
              user={selectedUser}
              onClose={() => setSelectedUser(null)}
              onUpdate={(updated) => {
                setUsers(users.map(u => u.id === updated.id ? updated : u));
                setSelectedUser(null);
              }}
            />
          )}

          {/* Edit Center Badges Modal */}
          {selectedCenter && (
            <AssignCenterBadgeModal
              center={selectedCenter}
              onClose={() => setSelectedCenter(null)}
              onUpdate={(updated) => {
                setCenters(centers.map(c => c.id === updated.id ? updated : c));
                setSelectedCenter(null);
              }}
            />
          )}
        </div>
      );
    }

    // Center badge modal (similar to user modal)
    function AssignCenterBadgeModal({ center, onClose, onUpdate }) {
      const [verifiedByAGLF, setVerifiedByAGLF] = React.useState(center?.verified_by_aglf || false);
      const [schoolPartner, setSchoolPartner] = React.useState(center?.school_partner || false);
      const [partnerBadge, setPartnerBadge] = React.useState(center?.partner_badge || '');
      const [saving, setSaving] = React.useState(false);

      const handleSave = async () => {
        setSaving(true);
        try {
          const token = localStorage.getItem('auth_token');
          const response = await fetch(`/api/admin/centers/${center.id}/trust-badges`, {
            method: 'PUT',
            headers: {
              'Authorization': `Bearer ${token}`,
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({
              verified_by_aglf: verifiedByAGLF,
              school_partner: schoolPartner,
              partner_badge: partnerBadge || null
            })
          });

          if (response.ok) {
            const updated = await response.json();
            alert('Trust badges updated successfully!');
            onUpdate?.(updated);
          } else {
            throw new Error('Failed to update badges');
          }
        } catch (error) {
          console.error('Error updating trust badges:', error);
          alert('Failed to update trust badges');
        } finally {
          setSaving(false);
        }
      };

      return (
        <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4">
          <div className="bg-white rounded-lg max-w-md w-full p-6">
            <h2 className="text-xl font-bold mb-4">Assign Trust Badges</h2>

            <div className="space-y-4 mb-6">
              <p className="text-sm text-gray-600">
                Assign badges to: <strong>{center?.name}</strong>
              </p>

              <label className="flex items-center gap-3 p-3 border rounded-lg hover:bg-gray-50 cursor-pointer">
                <input
                  type="checkbox"
                  checked={verifiedByAGLF}
                  onChange={(e) => setVerifiedByAGLF(e.target.checked)}
                  className="w-5 h-5"
                />
                <div>
                  <div className="font-medium text-green-700">✓ AGLF Verified</div>
                  <div className="text-xs text-gray-500">Verified by All Good Living Foundation</div>
                </div>
              </label>

              <label className="flex items-center gap-3 p-3 border rounded-lg hover:bg-gray-50 cursor-pointer">
                <input
                  type="checkbox"
                  checked={schoolPartner}
                  onChange={(e) => setSchoolPartner(e.target.checked)}
                  className="w-5 h-5"
                />
                <div>
                  <div className="font-medium text-blue-700">🎓 School Partner</div>
                  <div className="text-xs text-gray-500">Official school partnership status</div>
                </div>
              </label>

              <div className="space-y-2">
                <label className="block text-sm font-medium text-gray-700">
                  Additional Badge (Optional)
                </label>
                <select
                  value={partnerBadge}
                  onChange={(e) => setPartnerBadge(e.target.value)}
                  className="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-green-500"
                >
                  <option value="">None</option>
                  <option value="community">🤝 Community Partner</option>
                  <option value="trusted">🛡️ Trusted Location</option>
                </select>
              </div>
            </div>

            <div className="flex gap-3">
              <button
                onClick={onClose}
                className="flex-1 px-4 py-2 border border-gray-300 rounded-lg hover:bg-gray-50"
                disabled={saving}
              >
                Cancel
              </button>
              <button
                onClick={handleSave}
                className="flex-1 px-4 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 disabled:opacity-50"
                disabled={saving}
              >
                {saving ? 'Saving...' : 'Save Badges'}
              </button>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.render(React.createElement(TrustBadgeAdmin), document.getElementById('root'));
  </script>
</body>

</html>
